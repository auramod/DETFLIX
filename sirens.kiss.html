<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETFLIX - Video Player</title>
    <style>
        /* --- CSS: Netflix Style Dark Theme --- */
        body { background: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        h1 { color: #e50914; text-align: center; letter-spacing: 3px; font-size: 35px; margin-bottom: 30px; }
        
        .main-layout { display: flex; flex-wrap: wrap; gap: 20px; }
        
        /* Player Section */
        .video-section { flex: 2; min-width: 320px; }
        .player-box { background: #5b5b5b; border-radius: 8px; overflow: hidden; border: 1px solid #333; box-shadow: 0 0px 30px rgba(255, 63, 63, 0.5); }
        video { width: 100%; display: red; aspect-ratio: 16/9; }
        
        .video-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; }
        #nowPlaying { font-weight: bold; color: #fff; }
        
        select { background: #333; color: white; border: 1px solid #e50914; padding: 6px 12px; border-radius: 4px; cursor: pointer; outline: none; }
        select:hover { background: #e50914; }

        /* Sidebar: Episode List */
        .playlist-section { flex: 1; min-width: 280px; background: #1a1a1a; padding: 15px; border-radius: 8px; max-height: 550px; overflow-y: auto; border: 1px solid #333; }
        .playlist-section h2 { font-size: 18px; color: #aaa; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .ep-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .ep-item:hover { background: #222; color: #e50914; }
        .ep-item.active { border-left: 4px solid #e50914; background: #262626; color: #e50914; font-weight: bold; }
        
        /* Custom Scrollbar */
        .playlist-section::-webkit-scrollbar { width: 5px; }
        .playlist-section::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
    <link rel="icon" href="https://www.shutterstock.com/shutterstock/videos/3478463489/thumb/1.jpg?ip=x480" sizes="290x290" />
<body>

<div class="container">
    <h1>DETFLIX</h1>
    <h3>Siren's Kiss (Season 1) kdrama</h3>

        <div class="video-section">
            <div class="player-box">
                <video id="mainVideo" controls poster="https://via.placeholder.com/1280x720/000000/FFFFFF?text=DETFLIX+Select+Episode">
                    <source id="videoSource" src="" type="video/mp4">
                </video>
                <div class="video-info">
                    <span id="nowPlaying">Select an Episode</span>
                    <div>
                        <span style="font-size: 12px; margin-right: 5px; color: #888;">QUALITY:</span>
                        <select id="qualitySelect">
                            <option value="480">480p</option>
                            <option value="720" selected>720p (HD)</option>

                    </div>
                </div>
            </div>
        </div>

        <div class="playlist-section">
            <h2>EPISODES</h2>
            <div id="episodeList">
            </div>
        </div>
    </div>
</div>

    };

    const video = document.getElementById('mainVideo');
    const source = document.getElementById('videoSource');
    const qualitySelect = document.getElementById('qualitySelect');
    const nowPlayingText = document.getElementById('nowPlaying');
    const episodeListDiv = document.getElementById('episodeList');

    let currentEp = 1;

    // 16 Episodes ki list generate karna
    for (let i = 1; i <= 12; i++) {
        const item = document.createElement('div');
        item.className = `ep-item`;
        item.id = `ep-${i}`;
        item.innerHTML = `<span>▶</span> <span>Episode ${i}</span>`;
        item.onclick = () => loadEpisode(i);
        episodeListDiv.appendChild(item);
    }

    // Video Load Karne ka Function
    function loadEpisode(epNumber) {
        currentEp = epNumber;
        const quality = qualitySelect.value;
        const link = episodeLinks[epNumber][quality];

        if(link.includes("LINK_EP")) {
            alert("Pehle script mein apni video link add karein!");
            return;
        }

        source.src = link;
        nowPlayingText.innerText = `Playing: Episode ${epNumber}`;
        
        // Active class change
        document.querySelectorAll('.ep-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`ep-${epNumber}`).classList.add('active');

        video.load();
        video.play();
    }

    // Quality change hone par video restart na ho
    qualitySelect.onchange = () => {
        const currentTime = video.currentTime;
        const isPaused = video.paused;
        const link = episodeLinks[currentEp][qualitySelect.value];
        
        source.src = link;
        video.load();
        video.currentTime = currentTime;
        if (!isPaused) video.play();
    };
</script>

</body>
</html>
