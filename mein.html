    <style>
        /* --- CSS: Dark Premium Theme --- */
        body {
            background-color: #111;
            margin: 0;
            padding: 10px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Search Bar Styling */
        .search-container {
            position: sticky;
            top: 0;
            background: #111;
            padding: 10px 0;
            z-index: 100;
            margin-bottom: 15px;
        }

        #movieSearch {
            width: 100%;
            padding: 12px 15px;
            background: #222;
            border: 1px solid #e50914; /* Netflix Red Border */
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        /* --- Grid System: Mobile 3 Cards --- */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Mobile par 3 cards */
            gap: 8px;
        }

        /* Desktop par zyada cards dikhane ke liye */
        @media (min-width: 768px) {
            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
            }
        }

        /* Movie Card Design */
        .movie-card {
            background: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .movie-title {
            color: #fff;
            font-size: 10px;
            padding: 6px 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Search Results Not Found */
        #noResults {
            color: #888;
            text-align: center;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>

    <script>
        function filterMovies() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            let noResults = document.getElementById('noResults');
            let found = false;

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.movie-title').innerText.toLowerCase();
                
                if (title.includes(input)) {
                    cards[i].style.display = "block";
                    found = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            // Agar koi movie nahi mili
            if (found) {
                noResults.style.display = "none";
            } else {
                noResults.style.display = "block";
            }
        }
    </script>
